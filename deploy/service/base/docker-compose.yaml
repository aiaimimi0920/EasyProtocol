services:
  easy-protocol:
    build:
      context: ../../..
      dockerfile: deploy/service/base/Dockerfile
    image: ${EASY_PROTOCOL_SERVICE_IMAGE:-easy-protocol/easy-protocol:local}
    container_name: ${EASY_PROTOCOL_SERVICE_CONTAINER_NAME:-easy-protocol}
    restart: unless-stopped
    ports:
      - "${EASY_PROTOCOL_SERVICE_HOST_PORT:-19788}:9788"
    environment:
      EASY_PROTOCOL_CONFIG_PATH: /etc/easy-protocol/config.yaml
      EASY_PROTOCOL_RUNTIME_ENV_PATH: /etc/easy-protocol/runtime.env
      EASY_PROTOCOL_BOOTSTRAP_PATH: /etc/easy-protocol/bootstrap/r2-bootstrap.json
      EASY_PROTOCOL_STATE_DIR: /var/lib/easy-protocol
      EASY_PROTOCOL_RESET_STORE_ON_BOOT: "${EASY_PROTOCOL_RESET_STORE_ON_BOOT:-false}"
    volumes:
      - ${EASY_PROTOCOL_SERVICE_CONFIG_DIR:-./config}:/etc/easy-protocol
      - ${EASY_PROTOCOL_SERVICE_DATA_DIR:-./data}:/var/lib/easy-protocol
    networks:
      easyprotocol_service_network:
        aliases:
          - ${EASY_PROTOCOL_SERVICE_NETWORK_ALIAS:-easy-protocol}

networks:
  easyprotocol_service_network:
    name: ${EASY_PROTOCOL_SERVICE_NETWORK_NAME:-EasyAiMi}
    external: true
