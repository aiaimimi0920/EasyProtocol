name: Publish Provider Images GHCR

on:
  push:
    tags:
      - 'provider-*'
      - 'providers-*'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to publish'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - python
          - go
          - javascript
          - rust
      version:
        description: 'Override release version'
        required: false
        default: ''
      platform:
        description: 'Docker build platform list'
        required: false
        default: 'linux/amd64'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        shell: bash
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Prepare Operator Config
        env:
          EASYPROTOCOL_PUBLISH_GHCR_REGISTRY: ${{ secrets.EASYPROTOCOL_PUBLISH_GHCR_REGISTRY }}
          EASYPROTOCOL_PUBLISH_GHCR_OWNER: ${{ secrets.EASYPROTOCOL_PUBLISH_GHCR_OWNER }}
          EASYPROTOCOL_PUBLISH_GHCR_USERNAME: ${{ secrets.EASYPROTOCOL_PUBLISH_GHCR_USERNAME }}
          EASYPROTOCOL_PUBLISH_GHCR_TOKEN: ${{ secrets.EASYPROTOCOL_PUBLISH_GHCR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/materialize-action-config.py \
            --base-config config.example.yaml \
            --output config.yaml

      - name: Resolve Release Metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}"
          if [[ -z "${version}" ]]; then
            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              version="${GITHUB_REF_NAME}"
            else
              version="providers-$(date -u +%Y%m%d)-$(printf '%03d' "${GITHUB_RUN_NUMBER}")"
            fi
          fi
          provider="${{ github.event_name == 'workflow_dispatch' && inputs.provider || 'all' }}"
          {
            echo "version=${version}"
            echo "provider=${provider}"
            echo "platform=${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'linux/amd64' }}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate Release Tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          python scripts/validate-release-tag.py \
            --mode provider \
            --tag "${{ steps.release_meta.outputs.version }}"

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.EASYPROTOCOL_PUBLISH_GHCR_USERNAME != '' && secrets.EASYPROTOCOL_PUBLISH_GHCR_USERNAME || github.actor }}
          password: ${{ secrets.EASYPROTOCOL_PUBLISH_GHCR_TOKEN != '' && secrets.EASYPROTOCOL_PUBLISH_GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build And Publish Provider Images
        shell: pwsh
        run: >
          ./scripts/publish-provider-images.ps1
          -Target "${{ steps.release_meta.outputs.provider }}"
          -ConfigPath "./config.yaml"
          -ReleaseTag "${{ steps.release_meta.outputs.version }}"
          -Platform "${{ steps.release_meta.outputs.platform }}"
          -Push

